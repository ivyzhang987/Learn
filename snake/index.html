<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <header class="hud">
          <div>
            <p class="eyebrow">Classic Arcade</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </header>

        <div class="status-bar">
          <p id="status">Use arrow keys or WASD to start.</p>
          <div class="actions">
            <a class="home-link" href="../">Home</a>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <div class="controls" aria-label="On-screen controls">
          <button class="control-button" data-direction="up" type="button">Up</button>
          <div class="control-row">
            <button class="control-button" data-direction="left" type="button">Left</button>
            <button class="control-button" data-direction="down" type="button">Down</button>
            <button class="control-button" data-direction="right" type="button">Right</button>
          </div>
        </div>

        <p class="help">
          Eat food to grow. Don’t hit the wall or yourself. Press restart any time.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
